name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: SDK - Test, Lint, Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format & Lint check (biome)
        run: npm run format:check

      - name: Test with coverage (vitest)
        run: npm run test:coverage

      - name: Report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 14

      - name: Build (tsup)
        run: npm run build

  svelte-app:
    name: Sample App - Check, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            examples/svelte-app/package-lock.json

      - name: Install root dependencies (for SDK type resolution)
        run: npm ci

      - name: Install sample app dependencies
        run: npm ci
        working-directory: examples/svelte-app

      - name: Type check (svelte-check)
        run: npm run check
        working-directory: examples/svelte-app

      - name: Build (vite)
        run: npm run build
        working-directory: examples/svelte-app
